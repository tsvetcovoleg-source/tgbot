name: Deploy to cPanel

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  deploy-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='config.php' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='error_log' \
            --exclude='*.log' \
            --exclude='logs/' \
            --exclude='cache/' \
            --exclude='tmp/' \
            --exclude='temp/' \
            ./ deploy/

      - name: Deploy to test folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          source: "deploy/*"
          target: "/home/pubquest/public_html/tgbot.mindgames.md/test/"
          strip_components: 1
          overwrite: true

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='config.php' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='error_log' \
            --exclude='*.log' \
            --exclude='logs/' \
            --exclude='cache/' \
            --exclude='tmp/' \
            --exclude='temp/' \
            ./ deploy/

      - name: Deploy to production folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          source: "deploy/*"
          target: "/home/pubquest/public_html/tgbot.mindgames.md/"
          strip_components: 1
          overwrite: true
